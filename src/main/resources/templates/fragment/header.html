<!--/* Fragment 코드 */-->
<header xmlns:th="http://www.thymeleaf.org"
        th:fragment="main_header"
        class="jp-header">

  <script>
    const gatewayOrigin = window.location.origin;
    const userServiceBase = gatewayOrigin + '/user-service';
    const boardServiceBase = gatewayOrigin + '/board-service';

    function moveAfterRead(event, notiId, url) {
      event.preventDefault();
      fetch(userServiceBase + '/finalProject/notification/api/read/' + notiId, {
        method: 'POST',
        credentials: 'include'
      })
      .catch(() => {})
      .finally(() => {
        const badge = document.getElementById("notificationBadge");
        if (badge) {
          let count = parseInt(badge.innerText);
          if (count > 1) badge.innerText = count - 1;
          else badge.style.display = "none";
        }
        window.location.href = url;
      });
      return false;
    }

    function handleLogout(event) {
      event.preventDefault();

      fetch(userServiceBase + '/security/logout', {
        method: 'POST',
        credentials: 'include',
      })
      .finally(() => {
        if (window.JPAuth && typeof window.JPAuth.clearAccessToken === 'function') {
          window.JPAuth.clearAccessToken();
        }
        localStorage.removeItem('loginUser');
        sessionStorage.removeItem('accessToken');
        sessionStorage.removeItem('refreshToken');

        window.location.href = userServiceBase + '/member/login';
      });
    }

    document.addEventListener('DOMContentLoaded', function () {
      const msaGuestMenu = document.getElementById('msaGuestMenu');
      const msaUserMenu = document.getElementById('msaUserMenu');
      const msaLoginMemberId = document.getElementById('msaLoginMemberId');
      const msaAdminMenu = document.getElementById('msaAdminMenu');
      const msaCompanyMenu = document.getElementById('msaCompanyMenu');
      const msaMemberMenu = document.getElementById('msaMemberMenu');

      if (!msaGuestMenu || !msaUserMenu) return;

      fetch(userServiceBase + '/auth/check', {
        method: 'GET',
        credentials: 'include'
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          if (msaLoginMemberId) {
            msaLoginMemberId.textContent = data.memberId || '회원';
          }

          msaGuestMenu.classList.add('d-none');
          msaUserMenu.classList.remove('d-none');

          // 권한별 메뉴 - 기존 localStorage 폴백 유지
          const loginUserRaw = localStorage.getItem('loginUser');
          let role = '';

          if (loginUserRaw) {
            try {
              const loginUser = JSON.parse(loginUserRaw);
              role = loginUser.role || '';
            } catch (e) {}
          }

          if (msaAdminMenu && role.includes('ADMIN')) msaAdminMenu.classList.remove('d-none');
          if (msaCompanyMenu && role.includes('COMPANY')) msaCompanyMenu.classList.remove('d-none');
          if (msaMemberMenu && role.includes('MEMBER')) msaMemberMenu.classList.remove('d-none');

        } else {
          msaGuestMenu.classList.remove('d-none');
          msaUserMenu.classList.add('d-none');
        }
      })
      .catch(() => {
        msaGuestMenu.classList.remove('d-none');
        msaUserMenu.classList.add('d-none');
      });
    });
  </script>

  <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
    <div class="container-fluid jp-container">

      <a class="navbar-brand d-flex align-items-center jp-brand" href="/user-service/index">
        <span class="jp-brand__icon">
          <i class="fa-solid fa-magnifying-glass"></i>
        </span>
        <span class="jp-brand__text">잡파인더</span>
      </a>

      <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#jpNav"
              aria-controls="jpNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="jpNav">
        <ul class="navbar-nav mr-auto jp-nav">
          <li class="nav-item"><a class="nav-link" href="/user-service/job/list">채용정보</a></li>
          <li class="nav-item"><a class="nav-link" href="/user-service/companyinfo/list">기업정보</a></li>
          <li class="nav-item"><a class="nav-link" href="/board-service/community">커뮤니티</a></li>
          <li class="nav-item"><a class="nav-link" href="/user-service/notice">공지사항</a></li>
        </ul>

        <div class="d-flex align-items-center jp-auth">

          <!-- 로그인 전 -->
          <div id="msaGuestMenu" class="d-none">
            <a class="jp-auth__link" href="/user-service/member/login">로그인</a>
            <a class="btn btn-primary jp-auth__btn ml-2" href="/user-service/member/registerMember">회원가입</a>
          </div>

          <!-- 로그인 후 -->
          <div id="msaUserMenu" class="d-none">
            <div class="d-flex align-items-center">

              <div class="mr-3 text-muted" style="font-size:13px;">
                <b class="jp-brand__text" id="msaLoginMemberId"></b> 님
              </div>

              <!-- 관리자 -->
              <div id="msaAdminMenu" class="d-none">
                <a class="jp-auth__link" href="/user-service/admin/admin_dashboard">관리자</a>
              </div>

              <!-- 기업 -->
              <div id="msaCompanyMenu" class="d-none">
                <a class="jp-auth__link" href="/user-service/company/company_dashboard">기업페이지</a>
              </div>

              <!-- 개인 -->
              <div id="msaMemberMenu" class="d-none">
                <a class="jp-auth__link" href="/user-service/jobseeker/dashboard">마이페이지</a>
              </div>

              <!-- 로그아웃 -->
              <form class="m-0 ml-2" onsubmit="handleLogout(event);">
                <button type="submit" class="jp-auth__link btn btn-link p-0">로그아웃</button>
              </form>

            </div>
          </div>

        </div>
      </div>
    </div>
  </nav>
</header>
