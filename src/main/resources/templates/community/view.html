<!DOCTYPE html>
<html th:replace="~{layout/layout_main :: layout(~{::title}, ~{::link}, ~{::style}, ~{::script}, ~{::section})}"
      lang="ko"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="${post.title} + ' - 잡파인더'">게시글 - 잡파인더</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans KR', sans-serif; background: #F5F7FA; color: #333; line-height: 1.6; }

        .view-wrap { max-width: 860px; margin: 40px auto; padding: 0 20px 80px; }

        .post-card { background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 40px; margin-bottom: 16px; }
        .post-board-label { display: inline-block; padding: 4px 12px; color: white; border-radius: 4px; font-size: 12px; font-weight: 600; margin-bottom: 16px; }
        .post-title { font-size: 26px; font-weight: 700; color: #1a1a1a; margin-bottom: 20px; line-height: 1.4; }
        .post-meta { display: flex; align-items: center; gap: 16px; padding-bottom: 20px; border-bottom: 1px solid #F0F0F0; font-size: 14px; color: #999; }
        .post-author { font-weight: 600; color: #444; font-size: 15px; }
        .post-meta-actions { margin-left: auto; display: flex; gap: 8px; }
        .btn-sm { padding: 5px 12px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid #E0E0E0; background: white; color: #666; text-decoration: none; transition: all 0.2s; }
        .btn-sm:hover { background: #F5F7FA; }
        .btn-sm.danger { color: #e53e3e; border-color: #fed7d7; }
        .btn-sm.danger:hover { background: #fff5f5; }
        .post-content { padding: 28px 0; font-size: 16px; line-height: 1.9; color: #333; min-height: 120px; white-space: pre-wrap; }
        .post-footer { display: flex; justify-content: flex-end; padding-top: 16px; border-top: 1px solid #F0F0F0; }
        .report-btn { display: flex; align-items: center; gap: 5px; padding: 6px 14px; border: 1px solid #E0E0E0; border-radius: 20px; font-size: 13px; color: #999; cursor: pointer; background: white; transition: all 0.2s; }
        .report-btn:hover { border-color: #e53e3e; color: #e53e3e; }

        .post-nav { background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 16px; overflow: hidden; }
        .post-nav-item { display: flex; align-items: center; gap: 12px; padding: 14px 24px; border-bottom: 1px solid #F5F5F5; font-size: 14px; text-decoration: none; color: #333; transition: background 0.2s; }
        .post-nav-item:last-child { border-bottom: none; }
        .post-nav-item:hover { background: #F9FBFD; }
        .post-nav-label { font-size: 12px; color: #999; min-width: 40px; }
        .post-nav-item.disabled { color: #ccc; pointer-events: none; }

        .back-btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border: 1px solid #E0E0E0; border-radius: 8px; font-size: 14px; color: #666; text-decoration: none; background: white; margin-bottom: 24px; transition: all 0.2s; }
        .back-btn:hover { border-color: #1B8EF8; color: #1B8EF8; }

        .comment-card { background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 32px; }
        .comment-header { font-size: 17px; font-weight: 700; margin-bottom: 24px; color: #1a1a1a; }
        .comment-count { color: #1B8EF8; }

        .comment-form { margin-bottom: 28px; }
        .comment-form textarea { width: 100%; padding: 14px 16px; border: 1px solid #E0E0E0; border-radius: 8px; font-size: 14px; font-family: inherit; resize: none; outline: none; transition: border 0.2s; line-height: 1.6; }
        .comment-form textarea:focus { border-color: #1B8EF8; }
        .comment-form-footer { display: flex; justify-content: flex-end; margin-top: 8px; }
        .comment-submit { padding: 9px 22px; background: #1B8EF8; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .comment-submit:hover { background: #0D6FD8; }

        .comment-list { list-style: none; }
        .comment-item { padding: 20px 0; border-bottom: 1px solid #F5F5F5; }
        .comment-item:last-child { border-bottom: none; }
        .comment-top { display: flex; align-items: flex-start; gap: 10px; }
        .comment-avatar { width: 36px; height: 36px; background: #E3F2FF; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #1B8EF8; flex-shrink: 0; }
        .comment-body { flex: 1; }
        .comment-author-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .comment-author { font-size: 14px; font-weight: 600; color: #333; }
        .comment-date { font-size: 12px; color: #bbb; }
        .comment-text { font-size: 14px; color: #444; line-height: 1.7; }
        .comment-actions { display: flex; align-items: center; gap: 10px; margin-top: 8px; flex-wrap: wrap; }
        .comment-action-btn { font-size: 12px; color: #aaa; cursor: pointer; background: none; border: none; padding: 0; transition: color 0.2s; display: flex; align-items: center; gap: 3px; }
        .comment-action-btn:hover { color: #1B8EF8; }
        .comment-action-btn.danger:hover { color: #e53e3e; }

        .reply-list { list-style: none; }
        .reply-item { display: flex; gap: 10px; padding: 14px 0 14px 16px; border-left: 2px solid #E3F2FF; margin-left: 46px; margin-top: 8px; }
        .reply-avatar { width: 30px; height: 30px; background: #F0FFF4; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #27AE60; flex-shrink: 0; }
        .reply-icon { color: #aaa; font-size: 14px; margin-right: 4px; }

        .reply-form-wrap { margin-left: 46px; margin-top: 8px; display: none; }
        .reply-form-wrap.show { display: block; }
        .reply-form-wrap textarea { width: 100%; padding: 10px 14px; border: 1px solid #1B8EF8; border-radius: 8px; font-size: 13px; font-family: inherit; resize: none; outline: none; }
        .reply-form-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 6px; }
        .reply-cancel { padding: 7px 16px; border: 1px solid #E0E0E0; border-radius: 6px; font-size: 13px; cursor: pointer; background: white; color: #666; }
        .reply-submit { padding: 7px 16px; background: #1B8EF8; color: white; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; }

        .comment-edit-wrap { display: none; margin-top: 8px; }
        .comment-edit-wrap.show { display: block; }
        .comment-edit-wrap textarea { width: 100%; padding: 10px 14px; border: 1px solid #1B8EF8; border-radius: 8px; font-size: 14px; font-family: inherit; resize: none; outline: none; }
        .comment-edit-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 6px; }

        .comment-pagination { display: flex; justify-content: center; gap: 6px; margin-top: 28px; }
        .comment-pagination a { display: inline-block; width: 34px; height: 34px; line-height: 34px; text-align: center; border: 1px solid #E0E0E0; border-radius: 6px; font-size: 13px; color: #666; text-decoration: none; transition: all 0.2s; }
        .comment-pagination a:hover { border-color: #1B8EF8; color: #1B8EF8; }
        .comment-pagination a.active { background: #1B8EF8; color: white; border-color: #1B8EF8; }
        .comment-pagination a.disabled { opacity: 0.3; pointer-events: none; }

        .edit-post-wrap { display: none; }
        .edit-post-wrap.show { display: block; }
        .edit-post-wrap input[type=text] { width: 100%; padding: 10px 14px; border: 1px solid #1B8EF8; border-radius: 8px; font-size: 20px; font-weight: 700; margin-bottom: 12px; outline: none; }
        .edit-post-wrap textarea { width: 100%; padding: 14px 16px; border: 1px solid #1B8EF8; border-radius: 8px; font-size: 15px; font-family: inherit; resize: vertical; outline: none; min-height: 200px; }
        .edit-post-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 10px; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99999; align-items: center; justify-content: center; }
        .modal-overlay.show { display: flex; }
        .modal { background: white; border-radius: 16px; padding: 32px; width: 460px; max-width: 95vw; box-shadow: 0 20px 60px rgba(0,0,0,0.2); position: relative; z-index: 100000; }
        .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
        .modal-subtitle { font-size: 13px; color: #999; margin-bottom: 24px; }
        .modal-target { background: #F5F7FA; border-radius: 8px; padding: 12px 16px; font-size: 13px; color: #666; margin-bottom: 20px; }
        .modal-target strong { color: #333; }
        .modal label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 8px; }
        .reason-list { list-style: none; margin-bottom: 20px; }
        .reason-list li { margin-bottom: 8px; }
        .reason-list li label { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border: 1px solid #E0E0E0; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 400; color: #444; transition: all 0.2s; }
        .reason-list li label:hover { border-color: #1B8EF8; background: #F0F8FF; }
        .reason-list li input[type=radio] { accent-color: #1B8EF8; }
        .modal-content-input { width: 100%; padding: 12px 14px; border: 1px solid #E0E0E0; border-radius: 8px; font-size: 14px; font-family: inherit; resize: none; outline: none; margin-bottom: 20px; transition: border 0.2s; }
        .modal-content-input:focus { border-color: #1B8EF8; }
        .modal-footer { display: flex; gap: 10px; justify-content: flex-end; }
        .modal-cancel { padding: 10px 22px; border: 1px solid #E0E0E0; border-radius: 8px; font-size: 14px; cursor: pointer; background: white; color: #666; }
        .modal-submit { padding: 10px 22px; background: #e53e3e; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
        .modal-submit:hover { background: #c53030; }

        @media (max-width: 640px) {
            .post-card { padding: 24px 16px; }
            .comment-card { padding: 24px 16px; }
            .post-title { font-size: 20px; }
            .reply-item { margin-left: 20px; }
            .reply-form-wrap { margin-left: 20px; }
        }
    </style>
</head>
<body>
<section>
<div class="view-wrap">

    <!-- ✅ /board-service 제거 -->
    <a th:href="@{/community(boardId=${post.boardId})}" class="back-btn">← 목록으로</a>

    <div th:if="${reportMsg != null}"
         style="padding:12px 20px; background:#E3F2FF; color:#1B8EF8;
                border-radius:8px; margin-bottom:16px; font-size:14px; font-weight:600;"
         th:text="${reportMsg}">
    </div>

    <!-- 게시글 카드 -->
    <div class="post-card">
        <span class="post-board-label" th:text="${post.boardTitle}">게시판</span>

        <div id="postTitleView">
            <h1 class="post-title" th:text="${post.title}">제목</h1>
        </div>

        <div class="edit-post-wrap" id="editPostWrap">
            <!-- ✅ /board-service 제거 -->
            <form th:action="@{/community/edit}" method="post"
                  onsubmit="return confirm('저장하시겠습니까?')">
                <input type="hidden" name="postId" th:value="${post.postId}">
                <input type="hidden" name="boardId" th:value="${post.boardId}">
                <input type="text" name="title" th:value="${post.title}" placeholder="제목" required>
                <textarea name="content" rows="10" th:text="${post.content}" required></textarea>
                <div class="edit-post-footer">
                    <button type="button" class="reply-cancel" onclick="toggleEditPost(false)">취소</button>
                    <button type="submit" class="comment-submit">저장</button>
                </div>
            </form>
        </div>

        <div class="post-meta" th:data-author="${post.memberId}">
            <span class="post-author" th:text="${post.memberId}">작성자</span>
            <span th:text="${#temporals.format(post.createdAt, 'yyyy.MM.dd HH:mm')}">날짜</span>
            <span>조회 <span th:text="${post.viewCount}">0</span></span>
            <div class="post-meta-actions" id="postMetaActions" style="display:none;">
                <button class="btn-sm" onclick="toggleEditPost(true)">✏️ 수정</button>
                <!-- /board-service 제거 -->
                <form th:action="@{/community/delete}" method="post"
                      onsubmit="return confirm('삭제하시겠습니까?')">
                    <input type="hidden" name="postId" th:value="${post.postId}">
                    <button type="submit" class="btn-sm danger">🗑️ 삭제</button>
                </form>
            </div>
        </div>

        <div class="post-content" id="postContentView" th:text="${post.content}">내용</div>

        <div class="post-footer">
            <button class="report-btn"
                    th:data-id="${post.postId}"
                    th:data-label="${post.title}"
                    onclick="openReport(2, this.dataset.id, this.dataset.label)">
                🚨 신고
            </button>
        </div>
    </div>

    <!-- 이전/다음 글 -->
    <div class="post-nav">
        <!-- ✅ /board-service 제거 -->
        <a class="post-nav-item"
           th:href="${prevPost != null} ? @{/community/view(postId=${prevPost.postId})} : '#'"
           th:classappend="${prevPost == null} ? 'disabled'">
            <span class="post-nav-label">▲ 이전</span>
            <span th:text="${prevPost != null} ? ${prevPost.title} : '이전 글이 없습니다.'">이전글</span>
        </a>
        <a class="post-nav-item"
           th:href="${nextPost != null} ? @{/community/view(postId=${nextPost.postId})} : '#'"
           th:classappend="${nextPost == null} ? 'disabled'">
            <span class="post-nav-label">▼ 다음</span>
            <span th:text="${nextPost != null} ? ${nextPost.title} : '다음 글이 없습니다.'">다음글</span>
        </a>
    </div>

    <!-- 댓글 카드 -->
    <div class="comment-card">
        <div class="comment-header">
            댓글 <span class="comment-count" th:text="${#lists.size(comments)}">0</span>
        </div>

        <div class="comment-form" id="commentFormArea" style="display:none;">
            <!-- /board-service 제거 -->
            <form th:action="@{/community/comment}" method="post"
                  onsubmit="return confirm('댓글을 등록하시겠습니까?')">
                <input type="hidden" name="postId" th:value="${post.postId}">
                <input type="hidden" name="boardId" th:value="${post.boardId}">
                <textarea name="content" rows="3" placeholder="댓글을 입력하세요..." required></textarea>
                <div class="comment-form-footer">
                    <button type="submit" class="comment-submit">댓글 등록</button>
                </div>
            </form>
        </div>
        <div id="commentLoginNotice"
             style="padding:14px; background:#F5F7FA; border-radius:8px; text-align:center; font-size:14px; color:#999; margin-bottom:24px;">
            <!-- /board-service 제거 (user-service는 그대로) -->
            댓글을 작성하려면 <a th:href="@{/user-service/member/login}" style="color:#1B8EF8; font-weight:600;">로그인</a>이 필요합니다.
        </div>

        <ul class="comment-list">
            <li th:if="${#lists.isEmpty(comments)}"
                style="text-align:center; padding:40px 0; color:#aaa; font-size:14px;">
                첫 번째 댓글을 작성해보세요!
            </li>

            <li class="comment-item"
                th:each="comment : ${comments}"
                th:id="'comment-' + ${comment.commentId}"
                th:data-author="${comment.memberId}">

                <div class="comment-top">
                    <div class="comment-avatar" th:text="${#strings.substring(comment.memberId, 0, 1)}">A</div>
                    <div class="comment-body">
                        <div class="comment-author-row">
                            <span class="comment-author" th:text="${comment.memberId}">작성자</span>
                            <span class="comment-date" th:text="${#temporals.format(comment.createdAt, 'yyyy.MM.dd HH:mm')}">날짜</span>
                        </div>

                        <div th:id="'comment-text-' + ${comment.commentId}"
                             class="comment-text" th:text="${comment.content}">내용</div>

                        <div th:id="'comment-edit-' + ${comment.commentId}" class="comment-edit-wrap">
                            <!-- /board-service 제거 -->
                            <form th:action="@{/community/comment/edit}" method="post"
                                  onsubmit="return confirm('수정하시겠습니까?')">
                                <input type="hidden" name="commentId" th:value="${comment.commentId}">
                                <input type="hidden" name="postId" th:value="${post.postId}">
                                <input type="hidden" name="boardId" th:value="${post.boardId}">
                                <textarea rows="3" name="content" th:text="${comment.content}" required></textarea>
                                <div class="comment-edit-footer">
                                    <button type="button" class="reply-cancel"
                                            th:onclick="|toggleCommentEdit(${comment.commentId}, false)|">취소</button>
                                    <button type="submit" class="reply-submit">저장</button>
                                </div>
                            </form>
                        </div>

                        <div class="comment-actions" th:id="'comment-actions-' + ${comment.commentId}">
                            <button class="comment-action-btn comment-reply-btn" style="display:none;"
                                    th:onclick="|toggleReplyForm(${comment.commentId})|">💬 답글</button>

                            <span class="comment-owner-actions" style="display:none;">
                                <button class="comment-action-btn"
                                        th:onclick="|toggleCommentEdit(${comment.commentId}, true)|">수정</button>
                                <!-- /board-service 제거 -->
                                <form th:action="@{/community/comment/delete}" method="post" style="display:inline;"
                                      onsubmit="return confirm('삭제하시겠습니까?')">
                                    <input type="hidden" name="commentId" th:value="${comment.commentId}">
                                    <input type="hidden" name="postId" th:value="${post.postId}">
                                    <input type="hidden" name="boardId" th:value="${post.boardId}">
                                    <button type="submit" class="comment-action-btn danger">삭제</button>
                                </form>
                            </span>

                            <button class="comment-action-btn"
                                    th:data-id="${comment.commentId}"
                                    th:data-label="${comment.memberId}"
                                    onclick="openReport(3, this.dataset.id, this.dataset.label + '의 댓글')">
                                🚨 신고
                            </button>
                        </div>
                    </div>
                </div>

                <ul class="reply-list" th:if="${comment.replies != null and !#lists.isEmpty(comment.replies)}">
                    <li class="reply-item"
                        th:each="reply : ${comment.replies}"
                        th:data-author="${reply.memberId}">
                        <div class="reply-avatar" th:text="${#strings.substring(reply.memberId, 0, 1)}">B</div>
                        <div class="comment-body">
                            <div class="comment-author-row">
                                <span class="reply-icon">↳</span>
                                <span class="comment-author" th:text="${reply.memberId}">작성자</span>
                                <span class="comment-date" th:text="${#temporals.format(reply.createdAt, 'yyyy.MM.dd HH:mm')}">날짜</span>
                            </div>
                            <div class="comment-text" th:text="${reply.content}">대댓글 내용</div>
                            <div class="comment-actions">
                                <span class="reply-owner-actions" style="display:none;">
                                    <!-- ✅ /board-service 제거 -->
                                    <form th:action="@{/community/comment/delete}" method="post" style="display:inline;"
                                          onsubmit="return confirm('삭제하시겠습니까?')">
                                        <input type="hidden" name="commentId" th:value="${reply.commentId}">
                                        <input type="hidden" name="postId" th:value="${post.postId}">
                                        <input type="hidden" name="boardId" th:value="${post.boardId}">
                                        <button type="submit" class="comment-action-btn danger">삭제</button>
                                    </form>
                                </span>
                                <button class="comment-action-btn"
                                        th:data-id="${reply.commentId}"
                                        th:data-label="${reply.memberId}"
                                        onclick="openReport(3, this.dataset.id, this.dataset.label + '의 대댓글')">
                                    🚨 신고
                                </button>
                            </div>
                        </div>
                    </li>
                </ul>

                <div class="reply-form-wrap" th:id="'reply-form-' + ${comment.commentId}">
                    <!-- ✅ /board-service 제거 -->
                    <form th:action="@{/community/comment}" method="post"
                          onsubmit="return confirm('대댓글을 등록하시겠습니까?')">
                        <input type="hidden" name="postId" th:value="${post.postId}">
                        <input type="hidden" name="boardId" th:value="${post.boardId}">
                        <input type="hidden" name="parentCommentId" th:value="${comment.commentId}">
                        <textarea rows="2" name="content" placeholder="대댓글을 입력하세요..." required></textarea>
                        <div class="reply-form-footer">
                            <button type="button" class="reply-cancel"
                                    th:onclick="|toggleReplyForm(${comment.commentId})|">취소</button>
                            <button type="submit" class="reply-submit">등록</button>
                        </div>
                    </form>
                </div>
            </li>
        </ul>

        <!-- /board-service 제거 -->
        <div class="comment-pagination"
             th:if="${commentTotalPages != null and commentTotalPages > 1}">
            <a th:href="@{/community/view(postId=${post.postId},commentPage=1)}"
               th:classappend="${commentPage == 1} ? 'disabled'">◀</a>
            <a th:each="i : ${#numbers.sequence(1, commentTotalPages)}"
               th:href="@{/community/view(postId=${post.postId},commentPage=${i})}"
               th:text="${i}"
               th:classappend="${i == commentPage} ? 'active'"></a>
            <a th:href="@{/community/view(postId=${post.postId},commentPage=${commentTotalPages})}"
               th:classappend="${commentPage == commentTotalPages} ? 'disabled'">▶</a>
        </div>
    </div>
</div>

<!-- 신고 모달 -->
<div class="modal-overlay" id="reportModal">
    <div class="modal">
        <div class="modal-title">🚨 신고하기</div>
        <div class="modal-subtitle">허위 신고 시 서비스 이용이 제한될 수 있습니다.</div>
        <div class="modal-target">신고 대상: <strong id="reportTargetLabel">-</strong></div>

        <!--  /board-service 제거 -->
        <form th:action="@{/community/report}" method="post" id="reportForm">
            <input type="hidden" name="targetType" id="reportTargetType">
            <input type="hidden" name="targetId" id="reportTargetId">
            <input type="hidden" name="postId" th:value="${post.postId}">
            <input type="hidden" name="boardId" th:value="${post.boardId}">

            <label>신고 유형</label>
            <ul class="reason-list">
                <li th:each="reason : ${reportReasons}">
                    <label>
                        <input type="radio" name="reasonId" th:value="${reason.reasonId}" required>
                        <span th:text="${reason.reasonName}">신고유형</span>
                    </label>
                </li>
                <li th:if="${reportReasons == null or #lists.isEmpty(reportReasons)}">
                    <label><input type="radio" name="reasonId" value="1" required> 스팸/광고</label>
                </li>
                <li th:if="${reportReasons == null or #lists.isEmpty(reportReasons)}">
                    <label><input type="radio" name="reasonId" value="2"> 욕설/혐오발언</label>
                </li>
                <li th:if="${reportReasons == null or #lists.isEmpty(reportReasons)}">
                    <label><input type="radio" name="reasonId" value="3"> 음란물</label>
                </li>
                <li th:if="${reportReasons == null or #lists.isEmpty(reportReasons)}">
                    <label><input type="radio" name="reasonId" value="4"> 개인정보 노출</label>
                </li>
                <li th:if="${reportReasons == null or #lists.isEmpty(reportReasons)}">
                    <label><input type="radio" name="reasonId" value="5"> 기타</label>
                </li>
            </ul>

            <label>신고 내용 (선택)</label>
            <textarea class="modal-content-input" name="reportContent"
                      rows="3" placeholder="신고 사유를 구체적으로 적어주세요..."></textarea>

            <div class="modal-footer">
                <button type="button" class="modal-cancel" onclick="closeReport()">취소</button>
                <button type="submit" class="modal-submit">신고 접수</button>
            </div>
        </form>
    </div>
</div>

<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function () {

        var postFooter = document.querySelector('.post-footer');
        var commentCard = document.querySelector('.comment-card');

        var myId = /*[[${memberId}]]*/ null;
        var isLoggedIn = myId !== null && myId !== '' && myId !== 'null';

        applyLoginState(isLoggedIn, isLoggedIn ? myId : null);

        if (postFooter) postFooter.style.visibility = 'visible';
        if (commentCard) commentCard.style.visibility = 'visible';

        var modal = document.getElementById('reportModal');
        if (modal) document.body.appendChild(modal);

        document.getElementById('reportForm').onsubmit = function(e) {
            var reasonSelected = document.querySelector('input[name="reasonId"]:checked');
            if (!reasonSelected) {
                e.preventDefault();
                alert('신고 유형을 선택해주세요.');
                return;
            }
            if (!confirm('신고를 접수하시겠습니까?')) {
                e.preventDefault();
            }
        };
    });

    function applyLoginState(isLoggedIn, myId) {
        if (isLoggedIn) {
            var commentForm = document.getElementById('commentFormArea');
            if (commentForm) commentForm.style.display = 'block';

            var loginNotice = document.getElementById('commentLoginNotice');
            if (loginNotice) loginNotice.style.display = 'none';

            document.querySelectorAll('.comment-reply-btn').forEach(function(btn) {
                btn.style.display = 'inline-flex';
            });
        }

        if (!isLoggedIn) {
            var postReportBtn = document.querySelector('.report-btn');
            if (postReportBtn) postReportBtn.style.display = 'none';

            document.querySelectorAll('.comment-action-btn').forEach(function(btn) {
                if (btn.textContent.includes('신고')) btn.style.display = 'none';
            });
        }

        if (myId) {
            var postMeta = document.querySelector('.post-meta');
            if (postMeta && postMeta.dataset.author === myId) {
                var metaActions = document.getElementById('postMetaActions');
                if (metaActions) metaActions.style.display = 'flex';
            }

            document.querySelectorAll('.comment-item').forEach(function(item) {
                if (item.dataset.author === myId) {
                    var ownerActions = item.querySelector('.comment-owner-actions');
                    if (ownerActions) ownerActions.style.display = 'inline';
                }
            });

            document.querySelectorAll('.reply-item').forEach(function(item) {
                if (item.dataset.author === myId) {
                    var ownerActions = item.querySelector('.reply-owner-actions');
                    if (ownerActions) ownerActions.style.display = 'inline';
                }
            });
        }
    }

    function closeReport() {
        var overlay = document.getElementById('reportModal');
        overlay.style.cssText = 'display:none !important;';
        document.getElementById('reportForm').reset();
    }

    var reportModal = document.getElementById('reportModal');
    if (reportModal) {
        reportModal.addEventListener('click', function(e) {
            if (e.target === this) closeReport();
        });
    }

    function openReport(targetType, targetId, label) {
        document.getElementById('reportTargetType').value = targetType;
        document.getElementById('reportTargetId').value   = targetId;
        document.getElementById('reportTargetLabel').textContent = label;
        var overlay = document.getElementById('reportModal');
        overlay.style.cssText = 'display:flex !important; position:fixed !important; inset:0 !important; background:rgba(0,0,0,0.5) !important; z-index:99999 !important; align-items:center !important; justify-content:center !important;';
        var modal = overlay.querySelector('.modal');
        modal.style.cssText = 'display:block !important; background:white !important; border-radius:16px !important; padding:32px !important; width:460px !important; max-width:95vw !important; position:relative !important; z-index:100000 !important;';
    }

    function toggleReplyForm(commentId) {
        var el = document.getElementById('reply-form-' + commentId);
        if (el) el.classList.toggle('show');
    }

    function toggleCommentEdit(commentId, show) {
        var textEl    = document.getElementById('comment-text-' + commentId);
        var editEl    = document.getElementById('comment-edit-' + commentId);
        var actionsEl = document.getElementById('comment-actions-' + commentId);
        if (show) {
            textEl.style.display = 'none';
            editEl.classList.add('show');
            if (actionsEl) actionsEl.style.display = 'none';
        } else {
            textEl.style.display = 'block';
            editEl.classList.remove('show');
            if (actionsEl) actionsEl.style.display = 'flex';
        }
    }

    function toggleEditPost(show) {
        var titleView   = document.getElementById('postTitleView');
        var contentView = document.getElementById('postContentView');
        var editWrap    = document.getElementById('editPostWrap');
        var metaActions = document.getElementById('postMetaActions');
        if (show) {
            titleView.style.display   = 'none';
            contentView.style.display = 'none';
            editWrap.classList.add('show');
            if (metaActions) metaActions.style.display = 'none';
        } else {
            titleView.style.display   = 'block';
            contentView.style.display = 'block';
            editWrap.classList.remove('show');
            if (metaActions) metaActions.style.display = 'flex';
        }
    }
</script>

</section>
</body>
</html>
