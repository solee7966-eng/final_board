<!DOCTYPE html>
<html th:replace="~{layout/layout_main :: layout(~{::title}, ~{::link}, ~{::style}, ~{::script[name='scripts']}, ~{::section})}"
      lang="ko"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>커뮤니티 - 잡파인더</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #F5F7FA; color: #333; line-height: 1.6; }

        .community-header {
            background: linear-gradient(135deg, #1B8EF8 0%, #0D6FD8 100%);
            padding: 60px 24px; text-align: center; color: white;
        }
        .community-header h1 { font-size: 42px; font-weight: 700; margin-bottom: 12px; }
        .community-header p  { font-size: 18px; opacity: 0.95; margin-bottom: 32px; }

        .search-container { max-width: 600px; margin: 0 auto; position: relative; }
        .search-container input {
            width: 100%; padding: 16px 50px 16px 24px;
            border: none; border-radius: 50px; font-size: 16px; outline: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        .search-container button {
            position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
            background: #1B8EF8; border: none; padding: 10px 20px;
            border-radius: 50px; color: white; font-weight: 600; cursor: pointer;
        }
        .search-container button:hover { background: #0D6FD8; }

        .main-content {
            max-width: 1400px; margin: 40px auto; padding: 0 24px;
            display: grid; grid-template-columns: 240px 1fr 300px; gap: 24px;
        }

        .sidebar-left { height: fit-content; position: sticky; top: 90px; }
        .category-card { background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 24px; }
        .category-card h3 { font-size: 18px; font-weight: 700; margin-bottom: 20px; color: #333; }
        .category-list { list-style: none; }
        .category-list li { margin-bottom: 4px; }
        .category-list li a {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 16px; text-decoration: none; color: #666;
            border-radius: 8px; transition: all 0.3s; font-size: 15px;
        }
        .category-list li a:hover { background: #F5F7FA; color: #1B8EF8; }
        .category-list li a.active { background: #E3F2FF; color: #1B8EF8; font-weight: 600; }
        .category-count { font-size: 13px; color: #999; font-weight: 500; }

        .content-main { background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 32px; }
        .content-header { display: flex; justify-content: flex-end; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 16px; }

        .filter-tabs { display: flex; gap: 8px; flex-wrap: wrap; }
        .filter-tabs a { padding: 8px 16px; border: 1px solid #E0E0E0; background: white; border-radius: 20px; font-size: 14px; font-weight: 500; color: #666; cursor: pointer; transition: all 0.3s; text-decoration: none; }
        .filter-tabs a:hover { border-color: #1B8EF8; color: #1B8EF8; }
        .filter-tabs a.active { background: #1B8EF8; color: white; border-color: #1B8EF8; }

        .content-actions { display: flex; gap: 12px; align-items: center; }
        .sort-buttons { display: flex; gap: 8px; }
        .sort-buttons a {
            padding: 8px 14px; border: 1px solid #E0E0E0; background: white;
            border-radius: 6px; font-size: 13px; color: #666; cursor: pointer;
            transition: all 0.3s; text-decoration: none;
        }
        .sort-buttons a:hover { border-color: #1B8EF8; color: #1B8EF8; }
        .sort-buttons a.active { background: #E3F2FF; color: #1B8EF8; border-color: #1B8EF8; }

        .write-button {
            padding: 10px 24px; background: #1B8EF8; color: white;
            border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
            cursor: pointer; transition: all 0.3s; text-decoration: none;
            display: inline-flex; align-items: center; gap: 6px;
        }
        .write-button:hover { background: #0D6FD8; color: white; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(27,142,248,0.3); }

        .post-list { list-style: none; }
        .post-item { padding: 24px 0; border-bottom: 1px solid #F0F0F0; transition: all 0.3s; cursor: pointer; }
        .post-item:last-child { border-bottom: none; }
        .post-item:hover { background: #F9FBFD; margin: 0 -16px; padding: 24px 16px; border-radius: 8px; }
        .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }

        .category-badge { padding: 4px 12px; border-radius: 4px; font-size: 12px; font-weight: 600; color: white; }
        .badge-1 { background: red }
        .badge-2 { background: orange }
        .badge-3 { background: skyblue; }
        .badge-4 { background: navy; }
        .badge-5 { background: purple; }

        .hot-badge {
            padding: 4px 8px; background: linear-gradient(135deg, #FF6B6B 0%, #FF5252 100%);
            color: white; border-radius: 4px; font-size: 11px; font-weight: 700;
        }
        .post-title { font-size: 17px; font-weight: 600; color: #333; margin-bottom: 10px; line-height: 1.5; }
        .post-meta { display: flex; align-items: center; gap: 16px; font-size: 13px; color: #999; }
        .post-author { font-weight: 500; color: #666; }
        .post-stats { display: flex; gap: 12px; }
        .post-stats span { display: flex; align-items: center; gap: 4px; }

        .sidebar-right { height: fit-content; position: sticky; top: 90px; display: flex; flex-direction: column; gap: 24px; }
        .widget { background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 24px; }
        .widget h3 { font-size: 16px; font-weight: 700; margin-bottom: 20px; color: #333; }
        .hot-posts-list { list-style: none; }
        .hot-post-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid #F5F5F5; cursor: pointer; transition: all 0.3s; }
        .hot-post-item:last-child { border-bottom: none; }
        .hot-rank { font-size: 16px; font-weight: 700; color: #1B8EF8; min-width: 24px; }
        .hot-post-content { flex: 1; }
        .hot-post-category { font-size: 11px; color: #999; margin-bottom: 4px; }
        .hot-post-title { font-size: 13px; font-weight: 500; color: #333; line-height: 1.4; }

        .tag-cloud { display: flex; flex-wrap: wrap; gap: 8px; }
        .tag { padding: 6px 14px; background: #F5F7FA; border: 1px solid #E0E0E0; border-radius: 20px; font-size: 13px; color: #666; cursor: pointer; transition: all 0.3s; }
        .tag:hover { background: #E3F2FF; color: #1B8EF8; border-color: #1B8EF8; }

        .pagination { display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 40px; }
        .pagination a { display: inline-block; width: 40px; height: 40px; line-height: 40px; text-align: center; border: 1px solid #E0E0E0; background: white; border-radius: 8px; font-size: 14px; color: #666; text-decoration: none; transition: all 0.3s; }
        .pagination a:hover { border-color: #1B8EF8; color: #1B8EF8; }
        .pagination a.active { background: #1B8EF8; color: white; border-color: #1B8EF8; }
        .pagination a.disabled { opacity: 0.3; pointer-events: none; }

        .empty-msg { text-align: center; padding: 60px 0; color: #9ca3af; font-size: 15px; }

        @media (max-width: 1200px) {
            .main-content { grid-template-columns: 1fr 300px; }
            .sidebar-left { display: none; }
        }
        @media (max-width: 768px) {
            .main-content { grid-template-columns: 1fr; }
            .sidebar-right { display: none; }
            .community-header h1 { font-size: 32px; }
        }
    </style>
</head>

<body>
<section>

    <!-- 커뮤니티 헤더 -->
    <div class="community-header">
        <h1>💬 커뮤니티</h1>
        <p>취업 준비부터 직장 생활까지, 함께 이야기해요</p>
        <div class="search-container">
            <form th:action="@{/community}" method="get">
                <input type="hidden" name="boardId" th:value="${currentBoardId}">
                <input type="text" name="search" th:value="${param.search}" placeholder="궁금한 내용을 검색해보세요...">
                <button type="submit">검색</button>
            </form>
        </div>
    </div>

    <!-- 메인 컨텐츠 -->
    <div class="main-content">

        <!-- 좌측 사이드바: 카테고리 -->
        <aside class="sidebar-left">
            <div class="category-card">
                <h3>카테고리</h3>
                <ul class="category-list">
                    <li>
                        <a th:href="@{/community}"
                           th:classappend="${currentBoardId == null} ? 'active'">
                            📋 전체글
                        </a>
                    </li>
                    <li th:each="board : ${boards}">
                        <a th:href="@{/community(boardId=${board.boardId})}"
                           th:classappend="${currentBoardId == board.boardId} ? 'active'">
                            <span th:text="${board.title}"></span>
                            <span class="category-count" th:text="${board.postCount}"></span>
                        </a>
                    </li>
                </ul>
            </div>
        </aside>

        <!-- 메인 영역 -->
        <main class="content-main">
            <div class="content-header">
               <div class="content-actions" style="margin-left: auto;">
                    <div class="sort-buttons">
                        <a th:href="@{/community(boardId=${currentBoardId},sort='latest')}"
                           th:classappend="${sort == 'latest' or sort == null} ? 'active'">최신순</a>
                        <a th:href="@{/community(boardId=${currentBoardId},sort='popular')}"
                           th:classappend="${sort == 'popular'} ? 'active'">인기순</a>
                        <a th:href="@{/community(boardId=${currentBoardId},sort='comments')}"
                           th:classappend="${sort == 'comments'} ? 'active'">댓글순</a>
                    </div>

                    <a id="writeBtnArea"
                       th:href="@{/community/write(boardId=${currentBoardId})}"
                       class="write-button"
                       style="display:none;">✏️ 글쓰기</a>
                </div>
            </div>

            <!-- 게시글 목록 -->
            <table style="width:100%; border-collapse:collapse;">
                <thead>
                    <tr style="border-bottom: 2px solid #E0E0E0; font-size:13px; color:#999;">
                        <th style="padding:12px 8px; text-align:center; width:60px;">번호</th>
                        <th style="padding:12px 8px; text-align:center; width:100px;">게시판</th>
                        <th style="padding:12px 8px; text-align:left;">제목</th>
                        <th style="padding:12px 8px; text-align:center; width:100px;">작성자</th>
                        <th style="padding:12px 8px; text-align:center; width:80px;">날짜</th>
                        <th style="padding:12px 8px; text-align:center; width:60px;">조회</th>
                        <th style="padding:12px 8px; text-align:center; width:60px;">댓글</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(posts)}">
                        <td colspan="7" style="text-align:center; padding:60px 0; color:#9ca3af;">
                            게시글이 없습니다.
                        </td>
                    </tr>
                    <tr th:each="post, postStat : ${posts}"
                        th:onclick="|location.href='/community/view?postId=' + ${post.postId}|"
                        style="border-bottom:1px solid #F0F0F0; cursor:pointer; transition: background 0.2s;"
                        onmouseover="this.style.background='#F9FBFD'"
                        onmouseout="this.style.background='white'">

                        <td style="padding:14px 8px; text-align:center; font-size:13px; color:#999;"
                            th:text="${(currentPage - 1) * pageSize + postStat.count}"></td>

                        <td style="padding:14px 8px; text-align:center;">
                            <span th:class="'category-badge badge-' + ${(post.boardId % 5 == 0) ? 5 : (post.boardId % 5)}"
                                  th:text="${post.boardTitle}"></span>
                        </td>

                        <td style="padding:14px 8px;">
                            <div style="display:flex; align-items:center; gap:8px;">
                                <span style="font-size:15px; font-weight:500; color:#333;"
                                      th:text="${post.title}"></span>
                                <span style="padding:2px 6px; background:#FF5252; color:white;
                                             border-radius:4px; font-size:11px; font-weight:700;"
                                      th:if="${post.viewCount >= 100}">HOT</span>
                            </div>
                        </td>

                        <td style="padding:14px 8px; text-align:center;">
                            <div style="font-size:13px; color:#666; font-weight:500;"
                                 th:text="${post.memberId}"></div>
                            <div style="font-size:11px; color:#aaa; margin-top:2px;"
                                 th:text="${post.communityCompanyName} ?: ''"></div>
                        </td>

                        <td style="padding:14px 8px; text-align:center; font-size:12px; color:#999;"
                            th:text="${#temporals.format(post.createdAt, 'MM-dd')}"></td>

                        <td style="padding:14px 8px; text-align:center; font-size:13px; color:#999;"
                            th:text="${post.viewCount}"></td>

                        <td style="padding:14px 8px; text-align:center; font-size:13px; color:#1B8EF8;"
                            th:text="${post.commentCount}"></td>
                    </tr>
                </tbody>
            </table>

            <!-- 페이지네이션 -->
            <div class="pagination">
                <a th:href="@{/community(boardId=${currentBoardId},page=1,sort=${sort},search=${param.search})}"
                   th:classappend="${currentPage == 1} ? 'disabled'">◀</a>

                <a th:each="i : ${#numbers.sequence(1, totalPages)}"
                   th:href="@{/community(boardId=${currentBoardId},page=${i},sort=${sort},search=${param.search})}"
                   th:text="${i}"
                   th:classappend="${i == currentPage} ? 'active'"></a>

                <a th:href="@{/community(boardId=${currentBoardId},page=${totalPages},sort=${sort},search=${param.search})}"
                   th:classappend="${currentPage == totalPages} ? 'disabled'">▶</a>
            </div>
        </main>

        <!-- 우측 사이드바 -->
        <aside class="sidebar-right">

            <!-- 나의 활동 (기본 hidden → JS로 제어) -->
            <div class="widget" id="myActivityWidget" style="display:none;">
                <h3>👤 나의 활동</h3>
                <div style="display:flex; gap:8px; margin-bottom:16px;">
                    <a th:href="@{/community(type='myposts')}"
                       style="flex:1; text-align:center; padding:10px; background:#E3F2FF;
                              color:#1B8EF8; border-radius:8px; font-size:13px;
                              font-weight:600; text-decoration:none;">
                        ✏️ 내가 쓴 글<br>
                        <span style="font-size:18px; font-weight:700;"
                              th:text="${myPostCount}">0</span>
                    </a>
                    <a th:href="@{/community(type='mycomments')}"
                       style="flex:1; text-align:center; padding:10px; background:#F0FFF4;
                              color:#27AE60; border-radius:8px; font-size:13px;
                              font-weight:600; text-decoration:none;">
                        💬 댓글 단 글<br>
                        <span style="font-size:18px; font-weight:700;"
                              th:text="${myCommentCount}">0</span>
                    </a>
                </div>
            </div>
       
			<!-- 인기 게시글 TOP 5 -->
			<div class="widget">
			    <h3>🔥 인기 게시글 TOP 5</h3>
			    <ul class="hot-posts-list">
			        <li class="hot-post-item" th:each="post, stat : ${hotPosts}"
			            th:onclick="|location.href='/community/view?postId=' + ${post.postId}|">
			            <div class="hot-rank" th:text="${stat.count}"></div>
			            <div class="hot-post-content">
			                <div class="hot-post-category" th:text="'[' + ${post.boardTitle} + ']'"></div>
			                <div class="hot-post-title" th:text="${post.title}"></div>
			            </div>
			        </li>
			    </ul>
			</div>

			<!-- 최근 7일 인기글 -->
			<div class="widget">
			    <h3>🕐 최근 7일 인기글</h3>
			    <ul class="hot-posts-list">
			        <li class="hot-post-item" th:if="${#lists.isEmpty(recentHotPosts)}">
			            <span style="color:#999; font-size:13px;">최근 인기글이 없습니다.</span>
			        </li>
			        <li class="hot-post-item" th:each="post, stat : ${recentHotPosts}"
			            th:onclick="|location.href='/community/view?postId=' + ${post.postId}|">
			            <div class="hot-rank" th:text="${stat.count}"></div>
			            <div class="hot-post-content">
			                <div class="hot-post-title" th:text="${post.title}"></div>
			                <div class="hot-post-category">👁️ <span th:text="${post.viewCount}"></span></div>
			            </div>
			        </li>
			    </ul>
			</div>
        </aside>
    </div>

    <script name="scripts">
        document.addEventListener('DOMContentLoaded', function () {

            // 서버에서 재발급한 토큰 쿠키 감지 → sessionStorage 갱신
            const newTokenCookie = document.cookie.split(';')
                .find(c => c.trim().startsWith('newAccessToken='));
            if (newTokenCookie) {
                const newToken = newTokenCookie.trim().split('=')[1];
                if (window.JPAuth) {
                    window.JPAuth.setAccessToken(newToken);
                } else {
                    sessionStorage.setItem('accessToken', newToken);
                }
                document.cookie = 'newAccessToken=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/';
                console.log('[JPAuth] 서버 재발급 토큰 갱신 완료');
            }

            var loginUserRaw = localStorage.getItem('loginUser');
            var accessToken  = sessionStorage.getItem('accessToken');
            var isLoggedIn   = false;

            function isTokenExpired(token) {
                try {
                    const payload = JSON.parse(atob(token.split('.')[1]));
                    return payload.exp * 1000 < Date.now();
                } catch (e) {
                    return true;
                }
            }

            if (loginUserRaw && accessToken && !isTokenExpired(accessToken)) {
                try {
                    var loginUser = JSON.parse(loginUserRaw);
                    if (loginUser) isLoggedIn = true;
                } catch (e) {
                    isLoggedIn = false;
                }
            }

            if (isLoggedIn) {
                var writeBtn = document.getElementById('writeBtnArea');
                if (writeBtn) writeBtn.style.display = 'inline-flex';

                var myActivity = document.getElementById('myActivityWidget');
                if (myActivity) myActivity.style.display = 'block';
            }
        });
    </script>

</section>
</body>
</html>
