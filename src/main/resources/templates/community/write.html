<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout_main :: layout(~{::title},~{::link},~{::style},~{::script},~{::section})}">

<head>
    <meta charset="UTF-8">
    <title>글쓰기 - 잡파인더</title>
    <link></link>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #F5F7FA; color: #333; }

        .write-container {
            max-width: 900px; margin: 40px auto; padding: 0 24px;
        }

        .write-header {
            margin-bottom: 24px;
        }
        .write-header h2 {
            font-size: 28px; font-weight: 700; color: #333;
        }
        .write-header p {
            font-size: 14px; color: #999; margin-top: 8px;
        }

        .write-card {
            background: white; border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 40px;
        }

        .form-group { margin-bottom: 24px; }
        .form-group label {
            display: block; font-size: 14px; font-weight: 600;
            color: #555; margin-bottom: 8px;
        }
        .form-group select,
        .form-group input[type="text"] {
            width: 100%; padding: 12px 16px;
            border: 1px solid #E0E0E0; border-radius: 8px;
            font-size: 15px; color: #333; outline: none;
            transition: border-color 0.3s;
        }
        .form-group select:focus,
        .form-group input[type="text"]:focus {
            border-color: #1B8EF8;
        }
        .form-group textarea {
            width: 100%; padding: 16px;
            border: 1px solid #E0E0E0; border-radius: 8px;
            font-size: 15px; color: #333; outline: none;
            resize: vertical; min-height: 400px; line-height: 1.7;
            transition: border-color 0.3s; font-family: inherit;
        }
        .form-group textarea:focus { border-color: #1B8EF8; }

        .category-fixed {
            display: inline-block; padding: 10px 20px;
            background: #E3F2FF; color: #1B8EF8;
            border-radius: 8px; font-size: 15px; font-weight: 600;
        }

        .form-actions {
            display: flex; justify-content: flex-end;
            gap: 12px; margin-top: 32px;
        }
        .btn-cancel {
            padding: 12px 28px; border: 1px solid #E0E0E0;
            background: white; border-radius: 8px;
            font-size: 15px; color: #666; cursor: pointer;
            text-decoration: none; transition: all 0.3s;
        }
        .btn-cancel:hover { background: #F5F7FA; }
        .btn-submit {
            padding: 12px 28px; background: #1B8EF8;
            color: white; border: none; border-radius: 8px;
            font-size: 15px; font-weight: 600; cursor: pointer;
            transition: all 0.3s;
        }
        .btn-submit:hover { background: #0D6FD8; }
    </style>
</head>

<body>
<section>
    <div class="write-container">

        <div class="write-header">
            <h2>✏️ 글쓰기</h2>
            <p>커뮤니티에 글을 작성해보세요.</p>
        </div>

        <div class="write-card">
            <form th:action="@{/community/write}" method="post" onsubmit="return validateForm()">

                <!-- 카테고리 -->
                <div class="form-group">
                    <label>카테고리</label>

                    <div th:if="${selectedBoard != null}">
                        <span class="category-fixed" th:text="${selectedBoard.title}"></span>
                        <input type="hidden" name="boardId" th:value="${selectedBoard.boardId}">
                    </div>

                    <select th:if="${selectedBoard == null}" name="boardId">
                        <option value="">카테고리를 선택해주세요</option>
                        <option th:each="board : ${boards}"
                                th:value="${board.boardId}"
                                th:text="${board.title}"></option>
                    </select>
                </div>

                <!-- 제목 -->
                <div class="form-group">
                    <label>제목</label>
                    <input type="text" name="title" placeholder="제목을 입력해주세요" maxlength="200">
                </div>

                <!-- 내용 -->
                <div class="form-group">
                    <label>내용</label>
                    <textarea name="content" placeholder="내용을 입력해주세요"></textarea>
                </div>

                <div class="form-actions">
                    <a th:href="@{/community(boardId=${selectedBoard?.boardId})}"
                       class="btn-cancel">취소</a>
                    <button type="submit" class="btn-submit">등록</button>
                </div>
            </form>
        </div>

    </div>

    <script>
        /* ── 비로그인 접근 차단 (header.html 과 동일한 방식) ── */
        (function () {
            var loginUserRaw = sessionStorage.getItem('loginUser') || localStorage.getItem('loginUser');
            var accessToken  = sessionStorage.getItem('accessToken') || localStorage.getItem('accessToken');
            var isLoggedIn   = false;

            if (loginUserRaw && accessToken) {
                try {
                    var loginUser = JSON.parse(loginUserRaw);
                    if (loginUser) isLoggedIn = true;
                } catch (e) {}
            }

            if (!isLoggedIn) {
                alert('로그인이 필요한 서비스입니다.');
                location.href = '/user-service/member/login';
            }
        })();

        /* ── 폼 유효성 검사 ── */
        function validateForm() {
            var boardSelect  = document.querySelector('select[name="boardId"]');
            var hiddenBoard  = document.querySelector('input[name="boardId"]');
            var title   = document.querySelector('input[name="title"]').value.trim();
            var content = document.querySelector('textarea[name="content"]').value.trim();
            var boardId = boardSelect ? boardSelect.value : (hiddenBoard ? hiddenBoard.value : '');

            if (!boardId || boardId === '') { alert('카테고리를 선택해주세요.'); return false; }
            if (title === '')   { alert('제목을 입력해주세요.'); return false; }
            if (content === '') { alert('내용을 입력해주세요.'); return false; }

            return confirm('등록하시겠습니까?');
        }
    </script>

</section>
</body>
</html>
